<title>TWINZ COOPERATE SERVICES - World Tier App</title>
<style>
  :root {--bg:#0a0e1a; --card:#111827; --accent:#00d4ff; --accent2:#3b82f6; --text:#e5e7eb; --muted:#9ca3af; --success:#10b981; --warning:#fbbf24; --danger:#ef4444;}
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif}
  body{background:var(--bg);color:var(--text);padding-bottom:80px}
  header{background:linear-gradient(135deg,var(--accent2),var(--accent));padding:24px 20px;text-align:center;box-shadow:0 8px 30px rgba(59,130,246,0.4)}
  header h1{font-size:1.8rem;font-weight:900} header p{color:#fff;opacity:0.95;font-size:0.9rem}
 .container{max-width:1100px;margin:20px auto;padding:0 15px}
 .card{background:rgba(17,24,39,0.8);border:1px solid rgba(59,130,246,0.2);border-radius:16px;padding:20px;margin-bottom:15px}
 .card h3{color:var(--accent);margin-bottom:10px;font-size:1.2rem}
 .price{color:var(--warning);font-weight:800;font-size:1.3rem;margin:10px 0}
 .btn{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;border:none;padding:12px 18px;border-radius:10px;cursor:pointer;font-weight:700;width:100%;margin-top:10px}
 .btn.secondary{background:var(--accent);color:#000}.btn.danger{background:var(--danger)}.btn.success{background:var(--success)}.btn.small{width:auto;padding:6px 12px;font-size:0.8rem}
  input,textarea{width:100%;padding:12px;background:#1f2937;border:1px solid #374151;border-radius:10px;color:var(--text);margin:6px 0}
 .admin-bar{background:rgba(0,0,0,0.8);border-bottom:2px solid var(--accent);padding:12px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;position:sticky;top:0;z-index:100}
 .role-badge{padding:6px 12px;border-radius:20px;font-size:0.85rem;font-weight:800}
 .CEO{background:#ef4444}.Manager{background:#3b82f6}.Sales{background:#10b981}.Reception{background:#f59e0b}
 .login-screen{text-align:center;padding:60px 20px}
 .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;margin-top:15px}
 .product-card{background:#1f2937;border:1px solid #374151;border-radius:12px;padding:12px}
 .product-card img{width:100%;height:140px;object-fit:cover;border-radius:8px}
 .nav-tabs{display:flex;gap:10px;overflow-x:auto;padding:12px 0}
 .tab{padding:10px 16px;background:#1f2937;border:1px solid #374151;border-radius:10px;cursor:pointer;white-space:nowrap;font-weight:600}
 .tab.active{background:linear-gradient(135deg,var(--accent2),var(--accent))}
 .footer{text-align:center;color:var(--muted);font-size:0.85rem;padding:30px 20px}
 .search-bar{width:100%;padding:14px;background:#1f2937;border:2px solid var(--accent);border-radius:12px;color:var(--text);margin-bottom:15px}
  ul{list-style:none;padding-left:0} ul li{padding:4px 0;padding-left:20px;position:relative}
  ul li::before{content:'▸';position:absolute;left:0;color:var(--accent)}
</style>
</head>
<body>

<header><h1>TWINZ COOPERATE SERVICES PTY LTD</h1><p>BEST & QUALITY SERVICES | We Supply Workshops & Garages Across SA</p></header>

<div id="loginScreen" class="login-screen">
  <h2>Admin Login</h2><p style="color:var(--muted)">Select Role to Continue</p>
  <div style="max-width:400px;margin:20px auto">
    <button class="btn" onclick="login('CEO')">Login as CEO - Full Access</button>
    <button class="btn" onclick="login('Manager')">Login as Manager</button>
    <button class="btn" onclick="login('Sales')">Login as Sales</button>
    <button class="btn" onclick="login('Reception')">Login as Reception</button>
    <button class="btn secondary" onclick="enterClientMode()">Enter as Client</button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="admin-bar">
    <span class="role-badge" id="roleBadge">CEO</span>
    <button class="btn" style="width:auto" onclick="logout()">Logout</button>
    <button class="btn secondary" style="width:auto" onclick="generateClientLink()">Generate Client Link</button>
    <button class="btn success" style="width:auto" onclick="openInvoice()">🧾 Invoice</button>
  </div>
  <div class="container">
    <div id="shareLinkBox" style="display:none;margin-bottom:15px" class="card">
      <h4>Client Link Ready</h4><div id="shareLink" style="word-break:break-all"></div><button class="btn" onclick="copyLink()">Copy Link</button>
    </div>
    <div id="invoiceBox" style="display:none" class="card"></div>
    <div class="nav-tabs" id="tabs"></div>
    <div id="content"></div>
  </div>
</div>

<div id="clientView" style="display:none">
  <header><h1>TWINZ SERVICES</h1><p>Browse All 7 Categories</p></header>
  <div class="container">
    <input type="text" id="clientSearch" class="search-bar" placeholder="Search: BMW Engine, Diagnostics, Website..." onkeyup="searchClient()">
    <div id="clientContent"></div>
  </div>
</div>

<script>
const CATEGORIES = [
  {id:'diagnostics', name:'Vehicle Diagnostics',desc:'All Brand Diagnostics Software. JLR, VW, AUDI, BENZ, BMW, TOYOTA + more',features:['Full System Scan','DTC Clear','Service Reset','Key Programming'],price:'From R450', outOfStock:false, products:[]},
  {id:'internet', name:'Wireless Internet',desc:'Unlimited Fibre, LTE, Installation, Business WiFi',features:['Unlimited Data','Fast Installation','Business Packages'],price:'From R350/month', outOfStock:false, products:[]},
  {id:'web', name:'Web Development',desc:'Business Websites, Landing Pages, E-commerce',features:['Mobile-first','SEO','Hosting Setup'],price:'From R3000', note:'7-14 Days Delivery', outOfStock:false, products:[]},
  {id:'app', name:'App Development',desc:'Android + iOS Apps, Business Apps, Booking Systems',features:['React','Flutter','Firebase'],price:'From R5000', outOfStock:false, products:[]},
  {id:'parts', name:'Genuine Vehicle Parts',desc:'Engines, Gearboxes, Suspension, Electronics',features:['BMW','BENZ','AUDI','VW','JAGUAR'],price:'Quote on Request', outOfStock:false, products:[]},
  {id:'workshop', name:'Workshop Partnerships',desc:'Supply parts to garages nationwide',features:['Fleet diagnostics','Bulk pricing','Nationwide SA'],price:'Contact for Rates', outOfStock:false, products:[]},
  {id:'food', name:'Food Supply',desc:'Wholesale food supply for businesses',features:['Bulk Orders','Fresh Produce','Nationwide Delivery'],price:'Quote on Request', outOfStock:false, products:[]}
];
const CONTACT = {email:'twinz.cooperate.services@gmail.com',thabo:'068 254 7352',thabang:'069 894 9596',location:'Greater Tubatse, Limpopo',hours:'Mon - Sat | 8am - 6pm',company:'TWINZ COOPERATE SERVICES PTY LTD'};

let currentRole = 'CEO'; let currentTab = 0; let currentShareLink = ''; let invoiceItems = [];

function login(role){
  currentRole = role;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('roleBadge').className='role-badge '+role;
  document.getElementById('roleBadge').innerText=role;
  renderTabs(); renderContent();
}
function logout(){
  document.getElementById('app').style.display='none';
  document.getElementById('loginScreen').style.display='block';
  document.getElementById('shareLinkBox').style.display='none';
}
function enterClientMode(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('clientView').style.display='block';
  renderClient();
}
function searchClient(){
  const query = document.getElementById('clientSearch').value.toLowerCase();
  document.querySelectorAll('#clientContent.card').forEach(card=>{
    const text = card.innerText.toLowerCase();
    card.style.display = (query === '' || text.includes(query))? 'block' : 'none';
  });
}
function renderTabs(){document.getElementById('tabs').innerHTML = CATEGORIES.map((c,i)=>`<div class="tab ${i===currentTab?'active':''}" onclick="switchTab(${i})">${c.name}</div>`).join('');}
function switchTab(i){ currentTab=i; renderTabs(); renderContent(); }
function toggleStock(id){CATEGORIES.find(c=>c.id===id).outOfStock =!CATEGORIES.find(c=>c.id===id).outOfStock; renderContent();}
function addProduct(catId){
  const title = document.getElementById('pTitle'+catId).value; const price = document.getElementById('pPrice'+catId).value;
  const desc = document.getElementById('pDesc'+catId).value;
  if(!title ||!price){ alert('Enter Title and Price'); return; }
  CATEGORIES.find(c=>c.id===catId).products.push({id:Date.now(), title, price, desc, outOfStock:false});
  document.getElementById('pTitle'+catId).value='';document.getElementById('pPrice'+catId).value='';document.getElementById('pDesc'+catId).value='';
  renderContent();
}
function deleteProduct(catId, pId){CATEGORIES.find(c=>c.id===catId).products = CATEGORIES.find(c=>c.id===catId).products.filter(p=>p.id!==pId); renderContent();}
function renderProducts(cat){
  if(cat.products.length===0) return '<p style="color:var(--muted)">No products yet. Add your first item below.</p>';
  return `<div class="product-grid">${cat.products.map(p=>`<div class="product-card">
      <h4>${p.title}</h4><p style="color:var(--muted);font-size:0.85rem">${p.desc}</p><div class="price">${p.price}</div>
      ${currentRole!=='Reception'?`<button class="btn small success" onclick="addToInvoice('${p.title}','${p.price}')">+ Add to Invoice</button>
      <button class="btn small danger" onclick="deleteProduct('${cat.id}',${p.id})">Delete</button>`:''}
    </div>`).join('')}</div>`;
}
function renderContent(){
  const cat = CATEGORIES[currentTab];
  let html = `<div class="card"><h3>${cat.name}</h3><p>${cat.desc}</p><ul>${cat.features.map(f=>`<li>${f}</li>`).join('')}</ul><div class="price">${cat.price}</div>${cat.note?`<p style="color:var(--muted)">${cat.note}</p>`:''}
    <h4 style="margin-top:16px">Products: ${cat.products.length}</h4>${renderProducts(cat)}
    ${currentRole!=='Reception'?`<div class="card" style="margin-top:15px"><h4>Add New Product</h4><input id="pTitle${cat.id}" placeholder="Product Title"><input id="pPrice${cat.id}" placeholder="Price e.g. R25000"><textarea id="pDesc${cat.id}" placeholder="Description"></textarea><button class="btn" onclick="addProduct('${cat.id}')">+ Add Product</button></div>`:''}
    <h4 style="margin-top:12px">Send Client Request</h4><textarea id="msg${cat.id}" placeholder="Tell us what you need..."></textarea><button class="btn secondary" onclick="sendWhatsApp('${cat.id}')">Send WhatsApp</button></div>`;
  if(currentRole==='CEO' || currentRole==='Manager'){
    html += `<div class="card"><h3>Category Controls</h3><input placeholder="Edit Price" value="${cat.price}" onchange="cat.price=this.value"><textarea placeholder="Edit Description">${cat.desc}</textarea>
      <div style="display:flex;align-items:center;gap:10px;margin:12px 0"><input type="checkbox" id="stock${cat.id}" ${cat.outOfStock?'checked':''} onchange="toggleStock('${cat.id}')"><label>Mark Out of Stock</label></div></div>`;
  }
  document.getElementById('content').innerHTML = html;
}
function sendWhatsApp(id){const msg = document.getElementById('msg'+id).value || 'Hello TWINZ, I need assistance'; window.open(`https://wa.me/27682547352?text=${encodeURIComponent(msg)}`,'_blank');}
function generateClientLink(){const baseUrl = window.location.origin + window.location.pathname; currentShareLink = baseUrl + '#client'; document.getElementById('shareLink').innerText = currentShareLink; document.getElementById('shareLinkBox').style.display = 'block';}
function copyLink(){navigator.clipboard.writeText(currentShareLink); alert('Link Copied!');}
function renderClient(){
  let html = CATEGORIES.filter(c=>!c.outOfStock).map(cat=>`<div class="card"><h3>${cat.name}</h3><p>${cat.desc}</p><div class="price">${cat.price}</div></div>`).join('');
  html += `<div class="card"><h3>Contact Us</h3><p><b>Email:</b> ${CONTACT.email}</p><p><b>Thabo:</b> ${CONTACT.thabo}</p><p><b>Thabang:</b> ${CONTACT.thabang}</p>
    <button class="btn" onclick="window.open('https://wa.me/27682547352')">WhatsApp Thabo</button><button class="btn secondary" onclick="window.open('https://wa.me/27698949596')">WhatsApp Thabang</button></div><div class="footer">© 2026 ${CONTACT.company}</div>`;
  document.getElementById('clientContent').innerHTML = html;
}
function openInvoice(){document.getElementById('invoiceBox').style.display='block'; renderInvoice();}
function addToInvoice(title, price){const numPrice = parseFloat(price.replace(/[^0-9.]/g,'')) || 0; invoiceItems.push({title, price:numPrice, qty:1}); renderInvoice(); alert(title+' added to Invoice');}
function renderInvoice(){
  const total = invoiceItems.reduce((a,b)=>a+b.price*b.qty,0);
  let html = `<h3>Invoice</h3><p>Items: ${invoiceItems.length}</p><p class="price">Total: R${total.toFixed(2)}</p>
  <button class="btn success" onclick="window.open('https://wa.me/27682547352?text=Invoice Total: R${total.toFixed(2)}')">Send via WhatsApp</button>
  <button class="btn danger" onclick="invoiceItems=[];renderInvoice()">Clear</button>`;
  document.getElementById('invoiceBox').innerHTML = html;
}
window.addEventListener('load', ()=>{ if(window.location.hash === '#client'){ enterClientMode(); } });
</script>
</body>
</html>
